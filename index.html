        let startTime, animationFrame, selectedMood;
        const TARGET_TIME = 4280;

        window.onload = () => {
            const container = document.getElementById('colorContainer');
            moodData.moods.forEach(mood => {
                const div = document.createElement('div');
                div.className = 'circle';
                div.style.backgroundColor = mood.color;
                div.onclick = () => {
                    selectedMood = mood;
                    const glow = document.getElementById('glow');
                    glow.style.backgroundColor = mood.color;
                    glow.style.boxShadow = `0 0 20px ${mood.color}`;
                    document.getElementById('screen1').classList.add('hidden');
                    document.getElementById('screen2').classList.remove('hidden');
                };
                container.appendChild(div);
            });
        };

        function startGlow() {
            startTime = Date.now();
            function animate() {
                const progress = Math.min((Date.now() - startTime) / TARGET_TIME, 1);
                const glow = document.getElementById('glow');
                glow.style.filter = `blur(${15 - progress * 15}px) brightness(${0.5 + progress * 1.7})`;
                glow.style.transform = `scale(${1 + progress * 1.5})`;
                glow.style.boxShadow = `0 0 ${20 + progress * 80}px ${10 + progress * 30}px currentColor`;
                
                if (progress < 1) animationFrame = requestAnimationFrame(animate);
                else {
                    document.getElementById('screen2').classList.add('hidden');
                    document.getElementById('screen3').classList.remove('hidden');
                    document.getElementById('resultText').innerText = selectedMood.resultMessages[Math.floor(Math.random() * selectedMood.resultMessages.length)];
                    document.getElementById('resetBtn').innerText = selectedMood.conclusion;
                }
            }
            animationFrame = requestAnimationFrame(animate);
        }

        function endGlow() {
            cancelAnimationFrame(animationFrame);
            const glow = document.getElementById('glow');
            glow.style.filter = "blur(15px) brightness(0.5)";
            glow.style.transform = "scale(1)";
            glow.style.boxShadow = "0 0 20px currentColor";
        }

        function reset() {
            document.getElementById('screen3').classList.add('hidden');
            document.getElementById('screen1').classList.remove('hidden');
            document.getElementById('mainTitle').innerText = "今天感覺如何？";
            endGlow();
        }
    </script>
